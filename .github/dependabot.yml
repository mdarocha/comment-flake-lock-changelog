version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: 21:00
      timezone: Etc/UTC
    labels:
      - automated
    # eslint-plugin-github@6 (latest) locks @typescript-eslint to v8, which only
    # supports eslint ^8||^9. Until eslint-plugin-github ships a version that
    # uses @typescript-eslint v9+, eslint 10.x will break linting.
    ignore:
      - dependency-name: eslint
        versions:
          - 10.x
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 14
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: 21:00
      timezone: Etc/UTC
    labels:
      - automated
  - package-ecosystem: nix
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: 21:00
      timezone: Etc/UTC
    labels:
      - automated
    groups:
      nix-dependencies:
        patterns:
          - "*"
