query GetPullRequestChangedFiles($owner: String!, $repo: String!, $prNumber: Int!, $after: String) {
    repository(owner: $owner, name: $repo) {
        pullRequest(number: $prNumber) {
            files(first: 100, after: $after) {
                totalCount
                pageInfo {
                    endCursor
                    hasNextPage
                }
                nodes {
                    path
                }
            }
        }
    }
}
